      <rect class="input" y="46" width="718" height="46" rx="7"/>
      <text class="soft text" x="18" y="76" font-size="16">Task Title</text>

      <rect class="input" y="112" width="348" height="46" rx="7"/>
      <text class="text" x="20" y="142" font-size="16">Low Priority</text>
      <path d="M338 130l6 6 6-6" fill="none" stroke="#00122d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

      <rect class="input" x="370" y="112" width="348" height="46" rx="7"/>
      <text class="text" x="390" y="142" font-size="16">To Do</text>
