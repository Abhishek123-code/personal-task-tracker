<svg xmlns="http://www.w3.org/2000/svg" width="1860" height="1053" viewBox="0 0 1860 1053" role="img" aria-labelledby="title desc">
  <title id="title">Task Dashboard preview</title>
  <desc id="desc">Preview of the Personal Task Tracker dashboard with task form, task list, and analytics chart.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .card { fill: #ffffff; stroke: #d9e2ec; stroke-width: 1.4; }
      .muted-card { fill: #f8fafc; stroke: #edf2f7; stroke-width: 1; }
      .text { fill: #00122d; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #1f406a; }
      .soft { fill: #7184a5; }
      .blue { fill: #2563eb; }
      .green { fill: #22c55e; }
      .line { stroke: #dde6f2; stroke-width: 1; }
      .axis { stroke: #94a3b8; stroke-width: 1.2; }
      .input { fill: #ffffff; stroke: #c9d6e8; stroke-width: 1.2; }
      .button { fill: #2563eb; }
      .button-soft { fill: #eff6ff; }
      .button-danger { fill: #fef2f2; }
      .shadow { filter: drop-shadow(0 1px 2px rgb(15 23 42 / 0.12)); }
    </style>
  </defs>

  <rect class="bg" width="1860" height="1053"/>

  <g transform="translate(128 45)">
    <text class="text blue" font-size="36" font-weight="800">Task Dashboard</text>
    <text class="text muted" y="34" font-size="20">Manage tasks and view real-time analytics.</text>
  </g>

