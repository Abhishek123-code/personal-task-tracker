        <text fill="#dc2626" x="681" y="12" font-size="14" font-weight="700" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Delete</text>
        <line class="line" y1="52" x2="718" y2="52"/>
