version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: task-tracker-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taskdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  task-service:
    build:
      context: ./task-service
    container_name: task-tracker-task-service
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/taskdb?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  analytics-service:
    build:
      context: ./analytics-service
    container_name: task-tracker-analytics-service
    ports:
      - "3001:3001"
    environment:
      - TASK_SERVICE_URL=http://task-service:3000
    depends_on:
      - task-service
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: task-tracker-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_TASK_API_URL=http://localhost:3000/task
      - VITE_ANALYTICS_API_URL=http://localhost:3001/analytics
    restart: unless-stopped

volumes:
  postgres_data: